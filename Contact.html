<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Bright Label Boutique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 id="A">Contact Us</h1>
        <p id="B">We'd love to hear from you</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="contact-section">
            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p>Have a question about our latest collection or an existing order? Our team is here to help.</p>
                <div class="info-item">
                    <strong>Email:</strong> hello@brightlabel.com
                </div>
                <div class="info-item">
                    <strong>Location:</strong> Lagos, Nigeria
                </div>
            </div>

            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Bright Label Boutique</p>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
