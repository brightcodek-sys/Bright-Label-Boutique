<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Label | Fashion House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn { transition: all 0.3s ease; }
        .nav-btn:hover { color: #a1a1aa; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <header class="bg-white/90 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight cursor-pointer" onclick="showView('home')">Bright Label.</h1>
            
            <nav class="hidden md:flex space-x-10 text-sm font-medium items-center">
                <button onclick="showView('home')" class="nav-btn">Home</button>
                <button onclick="showView('shop')" class="nav-btn">Collection</button>
                <button onclick="showView('admin')" class="bg-black text-white px-6 py-2 hover:bg-zinc-800 transition rounded-full text-xs font-semibold">Admin Portal</button>
                <button onclick="showView('checkout')" class="nav-btn relative">
                    Bag (<span id="cart-count">0</span>)
                </button>
            </nav>
        </div>
    </header>

    <main>
        <section id="home-view" class="view active">
            <div class="bg-stone-50 text-black min-h-[80vh] flex flex-col items-center justify-center text-center px-6">
                <h2 class="text-5xl md:text-8xl font-light mb-10 tracking-tighter italic">New Standards.</h2>
                <button onclick="showView('shop')" class="border border-black px-16 py-4 text-sm hover:bg-black hover:text-white transition duration-500 rounded-full">Shop the Collection</button>
            </div>
        </section>

        <section id="shop-view" class="view max-w-7xl mx-auto px-6 py-24">
            <h3 class="text-3xl font-bold tracking-tighter mb-16 border-b pb-4">New Arrivals</h3>
            <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-12 gap-y-20"></div>
        </section>

        <section id="checkout-view" class="view max-w-xl mx-auto px-6 py-24">
            <h3 class="text-4xl font-bold mb-12 tracking-tighter text-center">Your Bag</h3>
            <div id="cart-items" class="space-y-6 mb-12 border-t pt-8"></div>
            <div class="flex justify-between font-bold text-2xl py-8 border-t border-b border-gray-100 mb-10">
                <span>Total</span>
                <span id="cart-total">₦0</span>
            </div>
            <button id="place-order-btn" class="w-full bg-black text-white py-6 text-sm font-bold hover:bg-zinc-800 transition rounded-xl">Complete Order</button>
        </section>

        <section id="admin-view" class="view max-w-xl mx-auto px-6 py-32">
            <div id="admin-auth-box" class="bg-white border border-gray-200 p-12 rounded-3xl shadow-sm space-y-10">
                <h3 class="text-center text-2xl font-bold tracking-tight">Admin Login</h3>
                <form id="auth-form" class="space-y-8">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400">Email Address</label>
                        <input type="email" id="adm-email" placeholder="admin@brightlabel.com" class="w-full border-b border-gray-200 py-3 text-sm outline-none focus:border-black lowercase" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400">Password</label>
                        <input type="password" id="adm-pass" placeholder="••••••••" class="w-full border-b border-gray-200 py-3 text-sm outline-none focus:border-black lowercase" required>
                    </div>
                    <button type="submit" class="w-full bg-black text-white py-5 text-sm font-bold rounded-2xl">Enter Dashboard</button>
                </form>
                <button id="forgot-password" class="block w-full text-xs text-gray-400 font-medium hover:text-black">Forgot password?</button>
            </div>

            <div id="admin-dashboard" class="hidden space-y-14">
                <div class="flex justify-between items-end border-b border-gray-100 pb-6">
                    <div>
                        <p class="text-xs text-gray-400 font-bold mb-2">Inventory Management</p>
                        <h4 class="text-4xl font-bold tracking-tighter">Items in Stock: <span id="inventory-count" class="italic text-gray-400">0</span></h4>
                    </div>
                    <button id="logout-btn" class="text-xs font-bold border border-black px-6 py-2 rounded-full hover:bg-black hover:text-white transition">Sign Out</button>
                </div>

                <form id="product-form" class="space-y-8 bg-stone-50 p-10 border border-stone-200 rounded-3xl">
                    <h4 class="text-sm font-bold mb-4">Add New Piece</h4>
                    <input type="text" id="p-name" placeholder="product name" class="w-full bg-transparent border-b border-stone-300 py-3 text-sm outline-none focus:border-black lowercase" required>
                    <div class="grid grid-cols-2 gap-8">
                        <input type="number" id="p-price" placeholder="price (₦)" class="w-full bg-transparent border-b border-stone-300 py-3 text-sm outline-none focus:border-black" required>
                        <input type="number" id="p-discount" placeholder="discount price (₦)" class="w-full bg-transparent border-b border-stone-300 py-3 text-sm outline-none focus:border-black">
                    </div>
                    <input type="number" id="p-stock" placeholder="units available" class="w-full bg-transparent border-b border-stone-300 py-3 text-sm outline-none focus:border-black" required>
                    
                    <div class="space-y-3">
                        <label class="block text-xs text-gray-500 font-bold">Product Photo</label>
                        <input type="file" id="p-file" class="text-xs w-full file:bg-black file:text-white file:border-none file:px-6 file:py-3 file:mr-4 file:rounded-xl cursor-pointer" accept="image/*" required>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-black text-white py-6 text-sm font-bold rounded-2xl transition hover:bg-zinc-800">
                        Upload to Collection
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzVQi7NmFPJA44ulxtIJujA4fn2Hc7qLA",
            authDomain: "bright-label.firebaseapp.com",
            projectId: "bright-label",
            storageBucket: "bright-label.firebasestorage.app",
            messagingSenderId: "1008754785320",
            appId: "1:1008754785320:web:988554796007d853b6891d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        const ADMIN_EMAIL = "your-email@gmail.com"; 
        let cart = [];

        window.showView = (name) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${name}-view`).classList.add('active');
            window.scrollTo(0,0);
        };

        // Auth handling
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('adm-email').value;
            const pass = document.getElementById('adm-pass').value;
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, pass);
                if (userCred.user.email !== ADMIN_EMAIL || !userCred.user.emailVerified) {
                    alert("Unauthorized access."); await signOut(auth);
                }
            } catch (err) { alert("Invalid credentials."); }
        };

        onAuthStateChanged(auth, (user) => {
            const isAdmin = user && user.email === ADMIN_EMAIL && user.emailVerified;
            document.getElementById('admin-auth-box').classList.toggle('hidden', isAdmin);
            document.getElementById('admin-dashboard').classList.toggle('hidden', !isAdmin);
        });

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Inventory handling
        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const file = document.getElementById('p-file').files[0];
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "Uploading...";

            try {
                const sRef = ref(storage, `products/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);

                await addDoc(collection(db, "products"), {
                    name: document.getElementById('p-name').value,
                    price: Number(document.getElementById('p-price').value),
                    discount: Number(document.getElementById('p-discount').value) || null,
                    stock: Number(document.getElementById('p-stock').value),
                    image: url,
                    date: Date.now()
                });
                document.getElementById('product-form').reset();
                alert("Listed successfully.");
            } catch (err) { alert("Error adding product."); }
            finally { btn.disabled = false; btn.innerText = "Upload to Collection"; }
        };

        onSnapshot(collection(db, "products"), (snap) => {
            document.getElementById('inventory-count').innerText = snap.size;
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const id = d.id;
                const isOut = p.stock <= 0;
                list.innerHTML += `
                    <div class="group relative ${isOut ? 'opacity-30' : ''}">
                        <div class="aspect-[3/4] bg-stone-100 overflow-hidden mb-6 rounded-2xl">
                            <img src="${p.image}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-1000">
                        </div>
                        <h4 class="text-xs font-bold mb-1">${p.name}</h4>
                        <div class="flex space-x-3 text-sm font-semibold py-1">
                            ${p.discount ? `<span class="line-through text-gray-300 font-light">₦${p.price.toLocaleString()}</span><span>₦${p.discount.toLocaleString()}</span>` : `<span>₦${p.price.toLocaleString()}</span>`}
                        </div>
                        <p class="text-[10px] text-gray-400 font-bold mb-6">${isOut ? 'Sold Out' : `${p.stock} Available`}</p>
                        ${!isOut ? `<button onclick="window.addToBag('${id}', '${p.name}', ${p.discount || p.price})" class="w-full border border-black py-3 text-xs font-bold hover:bg-black hover:text-white transition rounded-full">Add to Bag</button>` : ''}
                        ${auth.currentUser && auth.currentUser.email === ADMIN_EMAIL ? `<button onclick="window.del('${id}')" class="text-[10px] text-red-500 font-bold block w-full mt-4 underline">Delete Piece</button>` : ''}
                    </div>
                `;
            });
        });

        // Bag handling
        window.addToBag = (id, name, price) => { cart.push({ id, name, price }); updateBagUI(); };
        function updateBagUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const bag = document.getElementById('cart-items');
            bag.innerHTML = ""; let tot = 0;
            cart.forEach(i => {
                tot += i.price;
                bag.innerHTML += `<div class="flex justify-between text-xs font-bold py-2"><span>${i.name}</span><span>₦${i.price.toLocaleString()}</span></div>`;
            });
            document.getElementById('cart-total').innerText = `₦${tot.toLocaleString()}`;
        }

        document.getElementById('place-order-btn').onclick = async () => {
            if (cart.length === 0) return;
            for (const item of cart) {
                await updateDoc(doc(db, "products", item.id), { stock: increment(-1) });
            }
            alert("Order Complete."); cart = []; updateBagUI(); showView('home');
        };

        window.del = (id) => confirm("Delete this piece?") && deleteDoc(doc(db, "products", id));
    </script>
</body>
</html>
