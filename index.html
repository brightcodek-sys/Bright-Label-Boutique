<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Label Boutique | Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="logo">BRIGHT <span>LABEL</span></div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="admin.html" class="admin-btn">Admin</a></li>
    </ul>
</nav>
    <header class="hero">
        <div class="hero-text">
            <h1>New Season, New Style</h1>
            <p>Upgrade your wardrobe with our latest arrivals.</p>
            <a href="#shop" class="btn-main">Shop Collection</a>
        </div>
    </header>

    <main id="shop" class="container">
        <div class="shop-header">
            <h2>Featured Products</h2>
            <input type="text" id="searchBar" placeholder="Search items...">
        </div>

        <div id="productGrid" class="grid">
            <div class="card-loading">Loading boutique items...</div>
        </div>
    </main>
<section id="contact" class="contact-section">
    <div class="container">
        <div class="contact-header">
            <h2>Contact Us</h2>
            <p>Have questions? We'd love to hear from you.</p>
        </div>

        <div class="contact-content">
            <form action="https://formspree.io/f/xjgaobwg" method="POST" class="contact-form">
                <div class="form-row">
                    <input type="text" name="name" placeholder="Full Name" required>
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
                
                <input type="text" name="_gotcha" style="display:none">
                
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </div>
    </div>
</section>

    <footer>
        <p>&copy; 2026 Bright Label Boutique. Built with Code.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
