<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Label Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white text-zinc-900">

    <nav class="border-b border-zinc-100 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter cursor-pointer" onclick="showPage('home')">bright label.</h1>
            <div class="space-x-8 text-xs font-bold uppercase tracking-widest flex items-center">
                <button onclick="showPage('shop')" class="hover:text-zinc-500">Collection</button>
                <button onclick="showPage('admin')" class="hover:text-zinc-500">Admin</button>
                <button onclick="showPage('bag')" class="bg-zinc-900 text-white px-4 py-2 rounded-full">
                    Bag (<span id="bag-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <section id="home" class="page-section active">
        <div class="h-[80vh] flex flex-col items-center justify-center text-center px-6">
            <h2 class="text-6xl md:text-8xl font-light tracking-tighter mb-8 italic">Standard Luxury</h2>
            <button onclick="showPage('shop')" class="border-2 border-zinc-900 px-10 py-4 rounded-full font-bold uppercase text-xs hover:bg-zinc-900 hover:text-white transition">Shop Now</button>
        </div>
    </section>

    <section id="shop" class="page-section max-w-6xl mx-auto px-6 py-20">
        <h3 class="text-3xl font-bold mb-12 tracking-tight">The Collection</h3>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            </div>
    </section>

    <section id="bag" class="page-section max-w-xl mx-auto px-6 py-20">
        <h3 class="text-3xl font-bold mb-10 tracking-tight">Your Bag</h3>
        <div id="bag-items" class="space-y-4 mb-10"></div>
        <div class="border-t border-zinc-900 pt-6 flex justify-between items-center mb-10">
            <span class="text-lg font-bold">Total</span>
            <span id="bag-total" class="text-2xl font-bold">₦0</span>
        </div>
        <button id="checkout-btn" class="w-full bg-zinc-900 text-white py-5 rounded-2xl font-bold uppercase text-sm">Complete Order</button>
    </section>

    <section id="admin" class="page-section max-w-md mx-auto px-6 py-20">
        <div id="admin-login" class="bg-zinc-50 p-10 rounded-[2.5rem] border border-zinc-200">
            <h3 class="text-2xl font-bold mb-6">Vault Access</h3>
            <form id="login-form" class="space-y-5">
                <input type="email" id="email" placeholder="email address" class="w-full bg-transparent border-b border-zinc-300 py-3 outline-none focus:border-zinc-900 lowercase" required>
                <input type="password" id="pass" placeholder="password" class="w-full bg-transparent border-b border-zinc-300 py-3 outline-none focus:border-zinc-900 lowercase" required>
                <button type="submit" class="w-full bg-zinc-900 text-white py-4 rounded-2xl font-bold">Login</button>
            </form>
        </div>

        <div id="admin-dashboard" class="hidden space-y-10">
            <div class="flex justify-between items-center">
                <h3 class="text-2xl font-bold tracking-tight">Inventory</h3>
                <button onclick="handleLogout()" class="text-[10px] font-bold uppercase border border-zinc-300 px-4 py-2 rounded-full">Sign Out</button>
            </div>
            <form id="add-item-form" class="bg-zinc-50 p-8 rounded-[2rem] border border-zinc-200 space-y-4">
                <input type="text" id="p-name" placeholder="item name" class="w-full bg-transparent border-b border-zinc-300 py-2 outline-none lowercase" required>
                <div class="flex gap-4">
                    <input type="number" id="p-price" placeholder="price (₦)" class="w-full bg-transparent border-b border-zinc-300 py-2 outline-none" required>
                    <input type="number" id="p-stock" placeholder="stock qty" class="w-full bg-transparent border-b border-zinc-300 py-2 outline-none" required>
                </div>
                <input type="file" id="p-file" class="text-xs py-4" required>
                <button type="submit" id="up-btn" class="w-full bg-zinc-900 text-white py-4 rounded-xl font-bold">List Product</button>
            </form>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

        // Firebase Config (Keep these as they are)
        const firebaseConfig = {
            apiKey: "AIzaSyBzVQi7NmFPJA44ulxtIJujA4fn2Hc7qLA",
            authDomain: "bright-label.firebaseapp.com",
            projectId: "bright-label",
            storageBucket: "bright-label.firebasestorage.app",
            messagingSenderId: "1008754785320",
            appId: "1:1008754785320:web:988554796007d853b6891d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        // --- SET YOUR EMAIL HERE ---
        const MY_ADMIN_EMAIL = "your-email@gmail.com"; 

        // Page Navigation Logic
        window.showPage = (id) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        };

        // Authentication Logic
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if (res.user.email !== MY_ADMIN_EMAIL) {
                    alert("Unauthorized!"); await signOut(auth);
                }
            } catch (err) { alert("Access Denied."); }
        };

        onAuthStateChanged(auth, (user) => {
            const isAuthorized = user && user.email === MY_ADMIN_EMAIL;
            document.getElementById('admin-login').style.display = isAuthorized ? 'none' : 'block';
            document.getElementById('admin-dashboard').style.display = isAuthorized ? 'block' : 'none';
        });

        window.handleLogout = () => signOut(auth);

        // Product Upload Logic
        document.getElementById('add-item-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('up-btn');
            const file = document.getElementById('p-file').files[0];
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const sRef = ref(storage, `boutique/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);

                await addDoc(collection(db, "products"), {
                    name: document.getElementById('p-name').value,
                    price: Number(document.getElementById('p-price').value),
                    stock: Number(document.getElementById('p-stock').value),
                    image: url
                });
                document.getElementById('add-item-form').reset();
                alert("Listed successfully.");
            } catch (err) { alert("Failed to upload."); }
            finally { btn.innerText = "List Product"; btn.disabled = false; }
        };

        // Live Feed Logic (Shop & Inventory)
        onSnapshot(collection(db, "products"), (snap) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const isOut = p.stock <= 0;
                grid.innerHTML += `
                    <div class="group ${isOut ? 'opacity-40' : ''}">
                        <div class="aspect-[3/4] bg-zinc-100 rounded-3xl overflow-hidden mb-5">
                            <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        </div>
                        <h4 class="text-sm font-bold mb-1">${p.name}</h4>
                        <div class="flex justify-between items-center">
                            <span class="font-bold">₦${p.price.toLocaleString()}</span>
                            ${!isOut ? `<button onclick="addToBag('${d.id}', '${p.name}', ${p.price})" class="text-[10px] uppercase font-bold tracking-widest bg-zinc-900 text-white px-3 py-1 rounded-full">Add</button>` : '<span class="text-[10px] text-red-500 font-bold">SOLD</span>'}
                        </div>
                        ${auth.currentUser ? `<button onclick="del('${d.id}')" class="text-red-500 text-[9px] mt-4 block underline uppercase tracking-tighter">Delete</button>` : ''}
                    </div>
                `;
            });
        });

        // Bag Logic
        let bag = [];
        window.addToBag = (id, name, price) => {
            bag.push({ id, name, price });
            updateBagUI();
        };

        function updateBagUI() {
            document.getElementById('bag-count').innerText = bag.length;
            const list = document.getElementById('bag-items');
            list.innerHTML = "";
            let total = 0;
            bag.forEach(i => {
                total += i.price;
                list.innerHTML += `<div class="flex justify-between text-sm font-medium py-2 border-b border-zinc-100"><span>${i.name}</span><span>₦${i.price.toLocaleString()}</span></div>`;
            });
            document.getElementById('bag-total').innerText = `₦${total.toLocaleString()}`;
        }

        document.getElementById('checkout-btn').onclick = async () => {
            if (bag.length === 0) return;
            for (let item of bag) {
                await updateDoc(doc(db, "products", item.id), { stock: increment(-1) });
            }
            alert("Thank you for your order!");
            bag = []; updateBagUI(); showPage('home');
        };

        window.del = (id) => confirm("Permanently remove?") && deleteDoc(doc(db, "products", id));
    </script>
</body>
</html>
