<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Label | Hybrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .page-section { display: none; }
        .page-section.active { display: block; }
    </style>
</head>
<body class="bg-white text-zinc-900">

    <nav class="border-b p-5 flex justify-between items-center sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <h1 class="text-xl font-bold tracking-tighter cursor-pointer" onclick="showPage('shop')">bright label.</h1>
        <div class="flex gap-4 text-[10px] font-bold uppercase tracking-widest">
            <button onclick="showPage('shop')">Shop</button>
            <button onclick="showPage('admin')">Admin</button>
        </div>
    </nav>

    <section id="admin" class="page-section max-w-md mx-auto p-6 mt-10">
        <h3 class="font-bold mb-4 italic">Backstage Manager</h3>
        <form id="add-item-form" class="bg-zinc-50 p-6 rounded-3xl border space-y-4">
            <input type="text" id="p-name" placeholder="Item Name" class="w-full bg-transparent border-b py-2 outline-none" required>
            <input type="number" id="p-price" placeholder="Price (₦)" class="w-full bg-transparent border-b py-2 outline-none" required>
            <input type="number" id="p-stock" placeholder="Stock Quantity" class="w-full bg-transparent border-b py-2 outline-none" required>
            <input type="file" id="p-file" class="text-[10px]" required>
            <button type="submit" id="up-btn" class="w-full bg-black text-white py-4 rounded-xl font-bold uppercase text-[10px]">Sync to Cloud</button>
        </form>
    </section>

    <section id="shop" class="page-section active max-w-6xl mx-auto p-6">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // 1. CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBzVQi7NmFPJA44ulxtIJujA4fn2Hc7qLA",
            authDomain: "bright-label.firebaseapp.com",
            projectId: "bright-label",
            storageBucket: "bright-label.firebasestorage.app",
            messagingSenderId: "1008754785320",
            appId: "1:1008754785320:web:988554796007d853b6891d"
        };

        const SUPABASE_URL = 'https://rtmqrcpsdvzbbaktcemr.supabase.co';
        // USE THE LONG ANON KEY (Starts with eyJ)
        const SUPABASE_KEY = 'EYJ_LONG_ANON_KEY_FROM_DASHBOARD'; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.showPage = (id) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // 2. THE SYNC LOGIC
        document.getElementById('add-item-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('up-btn');
            const file = document.getElementById('p-file').files[0];
            btn.innerText = "Uploading Image..."; btn.disabled = true;

            try {
                // A. Upload to Supabase Storage
                const fileName = `boutique/${Date.now()}_${file.name}`;
                const { data, error } = await _supabase.storage
                    .from('boutique-images')
                    .upload(fileName, file);

                if (error) throw error;

                // Get the link for the photo
                const { data: { publicUrl } } = _supabase.storage
                    .from('boutique-images')
                    .getPublicUrl(fileName);

                // B. Save text details to Firebase
                await addDoc(collection(db, "products"), {
                    name: document.getElementById('p-name').value,
                    price: Number(document.getElementById('p-price').value),
                    stock: Number(document.getElementById('p-stock').value),
                    image: publicUrl,
                    createdAt: new Date()
                });

                alert("Luxury Synced Successfully!");
                document.getElementById('add-item-form').reset();
                showPage('shop');
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.innerText = "Sync to Cloud"; btn.disabled = false;
            }
        };

        // 3. LISTEN FOR UPDATES
        onSnapshot(collection(db, "products"), (snap) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div class="group">
                        <div class="aspect-[3/4] bg-zinc-100 rounded-2xl overflow-hidden mb-3">
                            <img src="${p.image}" class="w-full h-full object-cover">
                        </div>
                        <h4 class="text-[10px] font-bold uppercase text-zinc-400">${p.name}</h4>
                        <span class="text-sm font-bold">₦${p.price.toLocaleString()}</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>
