<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Bright Label Boutique</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">BRIGHT <span>LABEL</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="admin.html" class="admin-btn">Admin</a></li>
        </ul>
    </nav>

    <main class="contact-section">
        <h1>Contact Us</h1>
        <p>Fill out the form below and we will get back to you soon.</p>

        <form action="https://formspree.io/f/xjgaobwg" method="POST" id="contact-form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" name="name" id="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="message">Message:</label>
                <textarea name="message" id="message" rows="5" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Bright Label Boutique</p>
    </footer>

</body>
</html>
