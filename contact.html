<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bright Label Boutique</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">BRIGHT <span>LABEL</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="admin.html" class="admin-btn">Admin</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <div class="contact-card">
            <div class="contact-info">
                <h2>Reach Out</h2>
                <p>We'd love to hear from you. Whether it’s a question about an order or a style advice request.</p>
                
                <div class="info-item">
                    <span>📍</span>
                    <p>Lagos, Nigeria</p>
                </div>
                <div class="info-item">
                    <span>📧</span>
                    <p>support@brightlabel.com</p>
                </div>
            </div>

            <div class="contact-form-section">
                <form action="https://formspree.io/f/xjgaobwg" method="POST">
                    <div class="input-group">
                        <input type="text" name="name" required>
                        <label>Your Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" name="_replyto" required>
                        <label>Email Address</label>
                    </div>
                    <div class="input-group">
                        <textarea name="message" required></textarea>
                        <label>How can we help?</label>
                    </div>
                    <button type="submit" class="send-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
