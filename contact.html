<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bright Label Boutique</title>
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --white: #ffffff;
            --gray: #f4f4f4;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gray);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-card {
            background: var(--white);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--gold);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box; /* Prevents overlap */
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .send-btn {
            background-color: var(--dark);
            color: var(--white);
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .send-btn:hover {
            background-color: var(--gold);
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: var(--dark);
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .back-link:hover {
            opacity: 1;
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <div class="logo">BRIGHT <span>LABEL</span></div>
        <h1>Contact Us</h1>
        <p>Questions? Send us a message and we'll get back to you shortly.</p>

        <form action="https://formspree.io/f/xjgaobwg" method="POST">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="5" placeholder="How can we help?" required></textarea>
            </div>

            <input type="text" name="_gotcha" style="display:none">

            <button type="submit" class="send-btn">Send Message</button>
        </form>

        <a href="index.html" class="back-link">← Back to Boutique</a>
    </div>

</body>
</html>
